<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Maiden - Venda de Ingressos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>IRON MAIDEN</h1>
        <h2>World Tour 2026</h2>
    </header>

    <section class="contador">
        <h2>Abertura das vendas</h2>
        <div id="contadorVenda" class="timer">
            00d 00h 00m 00s
        </div>
    </section>

    <section class="vendas">
        <h2>Comprar Ingresso</h2>
        <p><strong>Ingressos disponíveis:</strong>
            <span id="estoque">50000</span>
        </p>

        <form id="formIngresso">
            <label>Setor</label>
            <select id="setor">
                <option>Pista Premium</option>
                <option>Pista Normal</option>
                <option>Arquibancada</option>
            </select>

            <label>Tipo</label>
            <select id="tipo">
                <option value="450">Inteira - R$450</option>
                <option value="225">Meia - R$225</option>
            </select>

            <label>Quantidade</label>
            <input type="number" id="quantidade" value="1" min="1" max="10">

            <button type="submit">
                Comprar
            </button>
        </form>

        <h3 id="resultado"></h3>
    </section>

    <section class="contador">
        <h2>Contagem para o Show</h2>
        <div id="contadorShow" class="timer">
            00d 00h 00m 00s
        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
